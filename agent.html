<!DOCTYPE html>
<html lang="en">
<head>
    <title>UCoE Navigation</title>
    <link rel="stylesheet" href="styles/agent.css">
    <link rel="stylesheet" href="boxicons-2.0.9/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <h1>Financial Literacy</h1>
        </div>
    
        <input type="checkbox" id="toggle">
    
        <label for="toggle" class="menu">&#9776;</label>
    
        <ul class="link">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html">tools</a></li>
            <li><a href="calculator.html">Calculator</a></li>
            <li><a href="agent.html">agent</a></li>
            <li><a href="about.html">about</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

<!-- AGENT SECTION -->

<div class="container">

    <header>
        <h2>💬 Finance AI Agent</h2>
        <p class="subtitle">Chat with our advanced AI model</p>
    </header>

    <div class="chat-container">

        <!-- MESSAGES -->
        <div class="chat-messages" id="chatMessages">

            <div class="message">
                <div class="avatar"><i class="fas fa-robot"></i></div>

                <div class="message-content">
                    Hello! I'm Finance AI Agent. How can I help you today?
                </div>
            </div>

        </div>

        <div class="input-container">
            <form class="input-form" id="chatForm">

                <textarea
                    id="userInput"
                    placeholder="Type your message here..."
                    rows="1"
                    required
                ></textarea>

                <button type="submit" id="sendButton">
                    <i class="bx bx-send"></i>
                </button>

            </form>
        </div>

    </div>

</div>

<!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 Financial Literacy Project</p>
    </footer>

<!-- JS FILE -->
<script src="javascript/agent.js"></script>

</body>
</html>
